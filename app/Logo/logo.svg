<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2235"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>

    <!-- Bar gradients — each lane slightly different teal -->
    <linearGradient id="bar1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3ecfcc"/>
      <stop offset="100%" style="stop-color:#2ab0ad"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#33bfbc"/>
      <stop offset="100%" style="stop-color:#1f9896"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#27aeab"/>
      <stop offset="100%" style="stop-color:#147f7d"/>
    </linearGradient>

    <!-- Glow filters per lane -->
    <filter id="glow1" x="-40%" y="-100%" width="180%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2" x="-40%" y="-100%" width="180%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow3" x="-40%" y="-100%" width="180%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Subtle dot glow -->
    <filter id="dotGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Clip to rounded square -->
    <clipPath id="bgClip">
      <rect width="240" height="240" rx="38" ry="38"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="240" height="240" rx="38" ry="38" fill="url(#bgGrad)"/>

  <!-- ── Connector rails ── -->
  <g stroke="#3a4f6a" stroke-width="1.5" stroke-linecap="round">
    <line x1="36" y1="76"  x2="204" y2="76"/>
    <line x1="36" y1="120" x2="204" y2="120"/>
    <line x1="36" y1="164" x2="204" y2="164"/>
  </g>

  <!-- ── Coordinator vertical bar ── -->
  <!-- Main stem -->
  <line x1="52" y1="76" x2="52" y2="164"
        stroke="#b0c4e0" stroke-width="5" stroke-linecap="round"/>
  <!-- Horizontal ticks to bars -->
  <g stroke="#b0c4e0" stroke-width="3.5" stroke-linecap="round">
    <line x1="52" y1="76"  x2="78" y2="76"/>
    <line x1="52" y1="120" x2="78" y2="120"/>
    <line x1="52" y1="164" x2="78" y2="164"/>
  </g>

  <!-- ── Worker bars — lane 1 (top) ── -->
  <rect x="78" y="67" width="106" height="18" rx="9"
        fill="url(#bar1)" filter="url(#glow1)" opacity="0.18"/>
  <rect x="78" y="67" width="106" height="18" rx="9" fill="url(#bar1)"/>
  <!-- highlight -->
  <rect x="86" y="69" width="70" height="5" rx="2.5" fill="white" opacity="0.15"/>

  <!-- ── Worker bars — lane 2 (middle) ── -->
  <rect x="78" y="111" width="106" height="18" rx="9"
        fill="url(#bar2)" filter="url(#glow2)" opacity="0.18"/>
  <rect x="78" y="111" width="106" height="18" rx="9" fill="url(#bar2)"/>
  <rect x="86" y="113" width="70" height="5" rx="2.5" fill="white" opacity="0.15"/>

  <!-- ── Worker bars — lane 3 (bottom) ── -->
  <rect x="78" y="155" width="106" height="18" rx="9"
        fill="url(#bar3)" filter="url(#glow3)" opacity="0.18"/>
  <rect x="78" y="155" width="106" height="18" rx="9" fill="url(#bar3)"/>
  <rect x="86" y="157" width="70" height="5" rx="2.5" fill="white" opacity="0.15"/>

  <!-- ── Entry dots (left) ── -->
  <circle cx="28" cy="76"  r="7" fill="#3ecfcc" filter="url(#dotGlow)"/>
  <circle cx="28" cy="76"  r="4" fill="#8eecea"/>
  <circle cx="28" cy="120" r="7" fill="#33bfbc" filter="url(#dotGlow)"/>
  <circle cx="28" cy="120" r="4" fill="#7de2e0"/>
  <circle cx="28" cy="164" r="7" fill="#27aeab" filter="url(#dotGlow)"/>
  <circle cx="28" cy="164" r="4" fill="#6dd4d2"/>

  <!-- ── Exit dots (right) ── -->
  <circle cx="212" cy="76"  r="7" fill="#3ecfcc" filter="url(#dotGlow)"/>
  <circle cx="212" cy="76"  r="4" fill="#8eecea"/>
  <circle cx="212" cy="120" r="7" fill="#33bfbc" filter="url(#dotGlow)"/>
  <circle cx="212" cy="120" r="4" fill="#7de2e0"/>
  <circle cx="212" cy="164" r="7" fill="#27aeab" filter="url(#dotGlow)"/>
  <circle cx="212" cy="164" r="4" fill="#6dd4d2"/>

  <!-- ── Parallel Worker label ── -->
  <text x="120" y="222"
        font-family="'DejaVu Sans', 'Segoe UI', Arial, sans-serif"
        font-size="13" font-weight="700"
        fill="#3ecfcc" opacity="0.75"
        text-anchor="middle" letter-spacing="1.5">Parallel Worker</text>
</svg>
